<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <title>Image Gallery</title>
</head>
<body>

  <div class="lightbox">
    <div class="box">
      <div class="box-header">
        <div class="profile-wrapper">
          <img src="images/profile.jpg" alt="image" class="profile-image">
          <div class="text-wrapper">
            <h3>Candra Dwi Cahyo</h3>
            <span>web developer</span>
          </div>
        </div>
        <div class="icon-wrapper">
          <i class="fa-solid fa-times" id="close-button"></i>
        </div>
      </div>
      <div class="box-body">
        <div class="image-box">
          <img alt="image" class="image" id="show-image">
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="heading">
      <h1>Image Gallery</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Atque ipsa aspernatur amet soluta ipsum fugiat ab. Cumque, vitae? Lorem ipsum dolor sit amet, consectetur adipisicing elit. Repudiandae provident numquam nisi
      </p>
    </div>
    <div class="image-container">
      <div class="image-box">
        <img src="images/1.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/2.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/3.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/4.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/5.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/6.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/7.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/8.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/9.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/10.jpg" alt="image" class="image-gallery">
      </div>
      <div class="image-box">
        <img src="images/11.jpg" alt="image" class="image-gallery">
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
